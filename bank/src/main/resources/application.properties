# Настройки JPA / Hibernate - привязываем его конфигурацию к PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
# Указываем url для EntityManager напрямую, чтобы обойти конфликт пулов
spring.jpa.properties.hibernate.connection.url=jdbc:postgresql://localhost:5432/bank_rules
spring.jpa.properties.hibernate.connection.username=postgres
