# Основная база данных (H2) - только для чтения транзакций клиентов
spring.datasource.url=jdbc:h2:file:./transaction;MODE=PostgreSQL;ACCESS_MODE_DATA=r
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Вторая база данных (PostgreSQL) - для записи динамических правил
spring.secondary-datasource.url=jdbc:postgresql://localhost:5432/bank_rules
spring.secondary-datasource.driver-class-name=org.postgresql.Driver
spring.secondary-datasource.username=postgres
